<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Control v10.6</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body onload="loadTasks()">
    <div class="background-grid"></div>

    <header>
        <h1 class="logo-text">NEXUS CONTROL</h1>
        <div class="main-editor glass">
            <div class="toolbar">
                <button onclick="execCmd('bold')"><span class="material-icons-round">format_bold</span></button>
                <button onclick="execCmd('italic')"><span class="material-icons-round">format_italic</span></button>
                <button onclick="execCmd('foreColor', '#a855f7')"><span class="material-icons-round">palette</span></button>
                <div class="divider"></div>
                <label for="fileInput" class="tool-btn"><span class="material-icons-round">attach_file</span></label>
                <button onclick="openLibrary()"><span class="material-icons-round">cloud_download</span></button>
            </div>
            <div id="editor" contenteditable="true" data-placeholder="> Descreva a missão..."></div>
            <input type="file" id="fileInput" onchange="handleFileSelection(this)" style="display:none">
            <div class="editor-footer">
                <span id="fileNameDisplay">Sem anexo</span>
                <button onclick="createNewTask()" class="btn-send" id="btnMainAction">REGISTRAR MISSÃO</button>
            </div>
        </div>
        <p id="statusMsg">STATUS: ONLINE</p>
    </header>

    <main class="kanban-board">
        <div class="column glass" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3 class="purple-neon">A FAZER</h3><div class="task-list" id="todo-list"></div>
        </div>
        <div class="column glass" id="doing" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3 class="blue-neon">ANDAMENTO</h3><div class="task-list" id="doing-list"></div>
        </div>
        <div class="column glass" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h3 class="green-neon">CONCLUÍDO</h3><div class="task-list" id="done-list"></div>
        </div>
    </main>

    <div id="libraryModal" class="modal">
        <div class="modal-content glass">
            <div class="modal-header">
                <h3>BIBLIOTECA DRIVE</h3>
                <span class="close" onclick="closeLibrary()">&times;</span>
            </div>
            <div id="fileListContainer" class="file-grid"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
